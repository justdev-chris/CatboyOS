name: Build CatboyOS ISO

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y xorriso squashfs-tools

      - name: Download Arch ISO
        run: |
          wget -O archlinux.iso https://mirror.rackspace.com/archlinux/iso/latest/archlinux-x86_64.iso

      - name: Mount and customize ISO
        run: |
          mkdir -p iso_mount
          sudo mount -o loop archlinux.iso iso_mount
          mkdir -p iso_custom
          sudo cp -r iso_mount/* iso_custom/
          sudo umount iso_mount
          
          # Add CatboyOS configs
          sudo mkdir -p iso_custom/arch/airootfs/etc/skel
          sudo cp -r configs/skel/* iso_custom/arch/airootfs/etc/skel/ 2>/dev/null || true
          sudo cp configs/kitty.conf iso_custom/arch/airootfs/etc/ 2>/dev/null || true
          sudo cp configs/i3.conf iso_custom/arch/airootfs/etc/ 2>/dev/null || true
          sudo cp configs/meowfetch iso_custom/arch/airootfs/usr/bin/ 2>/dev/null || true
          sudo mkdir -p iso_custom/arch/airootfs/usr/share/wallpapers
          sudo cp wallpapers/* iso_custom/arch/airootfs/usr/share/wallpapers/ 2>/dev/null || true

      - name: Create new ISO
        run: |
          sudo xorriso -as mkisofs \
            -o catboyos.iso \
            -b isolinux/isolinux.bin \
            -c isolinux/boot.cat \
            -no-emul-boot \
            -boot-load-size 4 \
            -boot-info-table \
            -J -R -V "CATBOYOS" \
            iso_custom/

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: catboyos
          path: catboyos.iso
