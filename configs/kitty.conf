# ─── CATBOYOS KITTY CONFIG ──────────────────────────────────────
# Meow.

# ─── APPEARANCE ──────────────────────────────────────────────────
font_family      JetBrains Mono
font_size        12.0

background_opacity 0.85
background_image ~/.config/kitty/background.png
background_image_layout scaled

# ─── COLORS (Catppuccin Latte) ──────────────────────────────────
foreground #4c4f69
background #eff1f5
selection_background #ccd0da
selection_foreground #4c4f69
url_color #1e66f5
cursor #4c4f69

color0 #5c5f77
color1 #d20f39
color2 #40a02b
color3 #df8e1d
color4 #1e66f5
color5 #8839ef
color6 #04a5e5
color7 #acb0be
color8 #6c6f85
color9 #e64553
color10 #66b04a
color11 #e9a83b
color12 #4c7ee6
color13 #a06de8
color14 #27b0e8
color15 #bcc0cc

# ─── CURSOR ──────────────────────────────────────────────────────
cursor_shape block
cursor_blink_interval 0.5
cursor_stop_blinking_after 2.0

# ─── SCROLLBACK ──────────────────────────────────────────────────
scrollback_lines 10000

# ─── MOUSE ──────────────────────────────────────────────────────
mouse_hide_wait 2.0
url_prefixes http https file ftp
detect_urls yes

# ─── BEHAVIOR ────────────────────────────────────────────────────
confirm_os_window_close 0
copy_on_select no
shell_integration enabled