# ─── CATBOYOS I3 CONFIG ──────────────────────────────────────────
# Meow. ~/.config/i3/config

# ─── MOD KEY ──────────────────────────────────────────────────────
set $mod Mod4

# ─── FONTS ────────────────────────────────────────────────────────
font pango:JetBrains Mono 10

# ─── COLORS (Catppuccin Latte) ───────────────────────────────────
# class                 border  bg      text    indicator
client.focused          #1e66f5 #1e66f5 #eff1f5 #1e66f5
client.focused_inactive #9ca0b0 #9ca0b0 #4c4f69 #9ca0b0
client.unfocused        #9ca0b0 #9ca0b0 #4c4f69 #9ca0b0
client.urgent           #d20f39 #d20f39 #eff1f5 #d20f39
client.placeholder      #e6e9ef #e6e9ef #4c4f69 #e6e9ef
client.background       #eff1f5

# ─── GAPS ──────────────────────────────────────────────────────────
gaps inner 5
gaps outer 5

# ─── WORKSPACES ───────────────────────────────────────────────────
set $ws1 1:🐱
set $ws2 2:💻
set $ws3 3:📁
set $ws4 4:🎵
set $ws5 5:🌐
set $ws6 6:🎮
set $ws7 7:📝
set $ws8 8:🧪
set $ws9 9:📦
set $ws10 10:🐾

# ─── KEYBINDS ─────────────────────────────────────────────────────
# Launch terminal
bindsym $mod+Return exec kitty

# Kill window
bindsym $mod+Shift+q kill

# Reload config
bindsym $mod+Shift+c reload

# Restart i3
bindsym $mod+Shift+r restart

# Exit i3
bindsym $mod+Shift+e exec i3-msg exit

# Move focus
bindsym $mod+h focus left
bindsym $mod+j focus down
bindsym $mod+k focus up
bindsym $mod+l focus right

# Move windows
bindsym $mod+Shift+h move left
bindsym $mod+Shift+j move down
bindsym $mod+Shift+k move up
bindsym $mod+Shift+l move right

# Split
bindsym $mod+v split vertical
bindsym $mod+b split horizontal

# Fullscreen
bindsym $mod+f fullscreen toggle

# Floating
bindsym $mod+Shift+space floating toggle

# Workspace switching
bindsym $mod+1 workspace $ws1
bindsym $mod+2 workspace $ws2
bindsym $mod+3 workspace $ws3
bindsym $mod+4 workspace $ws4
bindsym $mod+5 workspace $ws5
bindsym $mod+6 workspace $ws6
bindsym $mod+7 workspace $ws7
bindsym $mod+8 workspace $ws8
bindsym $mod+9 workspace $ws9
bindsym $mod+0 workspace $ws10

# Move windows to workspaces
bindsym $mod+Shift+1 move container to workspace $ws1
bindsym $mod+Shift+2 move container to workspace $ws2
bindsym $mod+Shift+3 move container to workspace $ws3
bindsym $mod+Shift+4 move container to workspace $ws4
bindsym $mod+Shift+5 move container to workspace $ws5
bindsym $mod+Shift+6 move container to workspace $ws6
bindsym $mod+Shift+7 move container to workspace $ws7
bindsym $mod+Shift+8 move container to workspace $ws8
bindsym $mod+Shift+9 move container to workspace $ws9
bindsym $mod+Shift+0 move container to workspace $ws10

# ─── MEDIA KEYS ───────────────────────────────────────────────────
bindsym XF86AudioRaiseVolume exec pactl set-sink-volume @DEFAULT_SINK@ +5%
bindsym XF86AudioLowerVolume exec pactl set-sink-volume @DEFAULT_SINK@ -5%
bindsym XF86AudioMute exec pactl set-sink-mute @DEFAULT_SINK@ toggle
bindsym XF86AudioPlay exec playerctl play-pause
bindsym XF86AudioNext exec playerctl next
bindsym XF86AudioPrev exec playerctl previous

# ─── BRIGHTNESS ───────────────────────────────────────────────────
bindsym XF86MonBrightnessUp exec brightnessctl set +10%
bindsym XF86MonBrightnessDown exec brightnessctl set 10%-

# ─── LAUNCHERS ────────────────────────────────────────────────────
bindsym $mod+d exec rofi -show run
bindsym $mod+p exec rofi -show drun

# ─── SCREENSHOT ──────────────────────────────────────────────────
bindsym Print exec flameshot gui
bindsym Shift+Print exec flameshot full

# ─── CATBOY CUSTOM ───────────────────────────────────────────────
bindsym $mod+Shift+m exec meow
bindsym $mod+Shift+o exec cat ~/.roar.txt

# ─── AUTO START ──────────────────────────────────────────────────
exec kitty
exec picom --config ~/.config/picom/picom.conf
exec nm-applet
exec volumeicon

# ─── BAR ──────────────────────────────────────────────────────────
bar {
    position bottom
    status_command i3status
    mode dock
    workspace_buttons yes
    tray_output primary
    colors {
        background #eff1f5
        statusline #4c4f69
        separator #ccd0da
        focused_workspace #1e66f5 #1e66f5 #eff1f5
        active_workspace #9ca0b0 #9ca0b0 #4c4f69
        inactive_workspace #e6e9ef #e6e9ef #4c4f69
        urgent_workspace #d20f39 #d20f39 #eff1f5
    }
}